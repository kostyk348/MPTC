; PlatformIO project for MPTC library ESP32 demo
; Build with: pio run -t upload && pio device monitor

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino
monitor_speed = 115200
build_flags =
    -DMPTC_TEST_HOST=1
    -DMPTC_USE_FLOAT=1
    -I${PROJECT_DIR}/../../include
    -std=c99
lib_extra_dirs = ${PROJECT_DIR}/../../src
build_src_filter = +<*> +<../../src/sdft.c> +<../../src/integral_img.c> +<../../src/mptc.c>
upload_speed = 921600
